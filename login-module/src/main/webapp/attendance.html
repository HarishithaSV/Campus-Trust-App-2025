<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus App - Attendance</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="page-container">
        <div class="page-card">
            <div class="page-header">
                <h1>Attendance</h1>
                <p>View and record your student attendance.</p>
            </div>

            <div class="attendance-actions">
                <form id="attendanceForm" class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="attendanceDate">Date</label>
                            <input type="date" id="attendanceDate" required>
                        </div>
                        <div class="form-group">
                            <label for="attendanceStatus">Status</label>
                            <select id="attendanceStatus" required>
                                <option value="PRESENT">Present</option>
                                <option value="ABSENT">Absent</option>
                                <option value="LATE">Late</option>
                                <option value="EXCUSED">Excused</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="attendanceRemark">Remark</label>
                        <input type="text" id="attendanceRemark" placeholder="Optional note">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <span class="btn-text">Save Attendance</span>
                        <span class="spinner" style="display: none;"></span>
                    </button>
                </form>
            </div>

            <div class="attendance-records">
                <h2>Attendance Records</h2>
                <div id="attendanceContainer">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Remark</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceList"></tbody>
                    </table>
                </div>
            </div>

            <div class="page-actions">
                <a class="btn btn-secondary" href="dashboard.html">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
