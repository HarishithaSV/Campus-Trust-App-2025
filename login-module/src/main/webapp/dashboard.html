<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus App - Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="page-container">
        <div class="page-card">
            <div class="page-header">
                <h1>Student Dashboard</h1>
                <p id="welcomeText">Welcome back!</p>
            </div>

            <div class="dashboard-grid">
                <div class="info-card">
                    <h2>My Profile</h2>
                    <p id="studentName"></p>
                    <p id="studentEmail"></p>
                    <p id="studentRole"></p>
                    <a class="btn btn-primary" href="profile.html">Edit Profile</a>
                </div>

                <div class="info-card">
                    <h2>Attendance</h2>
                    <p>View your attendance records and mark today's status.</p>
                    <a class="btn btn-primary" href="attendance.html">Open Attendance</a>
                </div>
            </div>

            <div class="page-actions">
                <button id="logoutBtn" class="btn btn-danger">Log Out</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
