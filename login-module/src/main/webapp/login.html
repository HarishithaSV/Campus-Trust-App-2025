<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus App - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Campus App</h1>
                <p class="subtitle">Login to your account</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="usernameOrEmail">Username or Email</label>
                    <input 
                        type="text" 
                        id="usernameOrEmail" 
                        name="usernameOrEmail" 
                        placeholder="Enter your username or email"
                        required
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="spinner" id="spinner" style="display: none;"></span>
                </button>
            </form>

            <div class="divider">OR</div>

            <div class="social-login">
                <button type="button" class="btn btn-social btn-google" onclick="loginWithGoogle()">
                    <span>🔵 Login with Google</span>
                </button>
                <button type="button" class="btn btn-social btn-github" onclick="loginWithGithub()">
                    <span>⚫ Login with GitHub</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>
    </div>

    <!-- Role Selection Modal (if first time) -->
    <div id="roleModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Select Your Role</h2>
            <p>Please select your role to continue</p>
            <div class="role-options">
                <button class="role-btn" onclick="selectRole('STUDENT')">👨‍🎓 Student</button>
                <button class="role-btn" onclick="selectRole('FACULTY')">👨‍🏫 Faculty</button>
                <button class="role-btn" onclick="selectRole('ADMIN')">👨‍💼 Admin</button>
                <button class="role-btn" onclick="selectRole('MANAGEMENT')">📊 Management</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
