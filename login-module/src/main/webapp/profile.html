<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus App - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="page-container">
        <div class="page-card">
            <div class="page-header">
                <h1>My Profile</h1>
                <p>Update your student profile information.</p>
            </div>

            <form id="profileForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" disabled>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" disabled>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                        <span class="error-message" id="firstNameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required>
                        <span class="error-message" id="lastNameError"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <input type="text" id="role" disabled>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="profilePictureUrl">Profile Picture URL</label>
                    <input type="text" id="profilePictureUrl">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <span class="btn-text">Save Changes</span>
                    <span class="spinner" style="display: none;"></span>
                </button>
            </form>

            <div class="page-actions">
                <a class="btn btn-secondary" href="dashboard.html">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
